name: hermes-auricle
label: Auricle
kind: platform
version: 0.2.0
description: >
  Hermes connector for auricle-engine. Bridges hermes-agent to a running
  auricle-engine instance over WebSocket. The engine handles all audio
  processing (wakeword, STT, TTS); this plugin contains only the hermes
  platform adapter logic.
author: Justin Pacella

optional_env:
  - name: AURICLE_ENGINE_WS_URL
    description: "WebSocket URL of the auricle-engine server (default: ws://localhost:57310)"
    prompt: "auricle-engine WebSocket URL"
    password: false
  - name: AURICLE_SESSION_RESUME
    description: "Resume existing session on hermes restart (default: true)"
    prompt: "Resume session on restart? (true/false)"
    password: false
  - name: AURICLE_SESSION_AUTO_CLEAR
    description: "Clear session history after a period of inactivity (default: true)"
    prompt: "Auto-clear session on inactivity? (true/false)"
    password: false
  - name: AURICLE_SESSION_CLEAR_AFTER
    description: "Seconds of inactivity before session history is cleared (default: 3600)"
    prompt: "Session clear-after duration (seconds)"
    password: false
