name: hermes-auricle
label: Auricle
kind: platform
version: 0.3.0
description: >
  Hermes connector for auricle-engine. Opens a WebSocket server that the
  engine connects to. Forwards agent responses as TTS and dispatches
  voice utterances as hermes messages.
author: Justin Pacella

optional_env:
  - name: AURICLE_CONNECTOR_HOST
    description: "Host to bind the WebSocket server on (default: localhost). Set to 0.0.0.0 to accept engine connections from remote machines."
    prompt: "Connector bind host"
    password: false
  - name: AURICLE_CONNECTOR_PORT
    description: "Port to listen on for engine connections (default: 57310)"
    prompt: "Connector port"
    password: false
  - name: AURICLE_SESSION_RESUME
    description: "Resume existing session on hermes restart (default: true)"
    prompt: "Resume session on restart? (true/false)"
    password: false
  - name: AURICLE_SESSION_AUTO_CLEAR
    description: "Clear session history after a period of inactivity (default: true)"
    prompt: "Auto-clear session on inactivity? (true/false)"
    password: false
  - name: AURICLE_SESSION_CLEAR_AFTER
    description: "Seconds of inactivity before session history is cleared (default: 3600)"
    prompt: "Session clear-after duration (seconds)"
    password: false
